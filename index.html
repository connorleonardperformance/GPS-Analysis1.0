<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS Analytics — Elite S&C</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cy:#00d4ff;--cy2:#00b8e0;--cy-bg:#00d4ff12;--cy-bd:#00d4ff28;
  --gn:#00e676;--rd:#ff4757;
  --bg:#080c10;--bg2:#0e1318;--bg3:#131920;--bg4:#1a2028;
  --bd:#1e2830;--bd2:#243040;
  --t:#e8f0fe;--t2:#8fa8c0;--t3:#4a6278;--t4:#2a3d50
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--bg3);border:1px solid var(--bd2);border-radius:14px;padding:32px 28px;width:100%;max-width:400px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center}
.logo-icon{width:38px;height:38px;background:var(--cy);border-radius:9px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px;fill:#080c10}
.logo-t{font-size:17px;font-weight:600;color:#fff}
.logo-s{font-size:10px;color:var(--cy);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-top:1px}
.tabs{display:flex;border-bottom:1px solid var(--bd2);margin-bottom:22px}
.tab{flex:1;padding:9px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--t3);font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab.active{color:var(--cy);border-bottom-color:var(--cy)}
.fl{font-size:10px;color:var(--t3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px}
.fg{margin-bottom:14px}
.fi{background:var(--bg4);border:1px solid var(--bd2);border-radius:7px;padding:9px 11px;font-size:13px;color:var(--t);width:100%;outline:none;font-family:inherit}
.fi:focus{border-color:var(--cy);color:#fff}
.fi::placeholder{color:var(--t4)}
.btn{background:var(--cy);color:#080c10;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;transition:background .15s;margin-top:4px}
.btn:hover{background:var(--cy2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{font-size:11px;color:var(--rd);margin-top:10px;text-align:center;min-height:16px}
.ok{font-size:11px;color:var(--gn);margin-top:10px;text-align:center;min-height:16px}
.form{display:none}.form.active{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    </div>
    <div><span class="logo-t">GPS Analytics</span><span class="logo-s">Elite S&C Platform</span></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Sign in</button>
    <button class="tab" onclick="switchTab('signup')">Create account</button>
  </div>

  <div id="form-login" class="form active">
    <div class="fg"><div class="fl">Email</div><input class="fi" id="l-email" type="email" placeholder="you@example.com" autocomplete="email"></div>
    <div class="fg"><div class="fl">Password</div><input class="fi" id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn" id="l-btn" onclick="doLogin()">Sign in</button>
    <div class="err" id="l-err"></div>
  </div>

  <div id="form-signup" class="form">
    <div class="fg"><div class="fl">Full name</div><input class="fi" id="s-name" type="text" placeholder="e.g. Connor Leonard" autocomplete="name"></div>
    <div class="fg"><div class="fl">Email</div><input class="fi" id="s-email" type="email" placeholder="you@example.com" autocomplete="email"></div>
    <div class="fg"><div class="fl">Password</div><input class="fi" id="s-pass" type="password" placeholder="Min. 8 characters" autocomplete="new-password"></div>
    <button class="btn" id="s-btn" onclick="doSignup()">Create account</button>
    <div class="err" id="s-err"></div>
    <div class="ok" id="s-ok"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xdgbpcqefurjaostzoxn.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_TchRhIKV-OZto2MV-OCfvA_LoEAHqiA';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Redirect if already logged in
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = '/app.html';
});

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('form-login').classList.toggle('active', tab === 'login');
  document.getElementById('form-signup').classList.toggle('active', tab === 'signup');
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass = document.getElementById('l-pass').value;
  const btn = document.getElementById('l-btn');
  const err = document.getElementById('l-err');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Please fill in all fields.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { err.textContent = error.message; btn.disabled = false; btn.textContent = 'Sign in'; return; }
  window.location.href = '/app.html';
}

async function doSignup() {
  const name = document.getElementById('s-name').value.trim();
  const email = document.getElementById('s-email').value.trim();
  const pass = document.getElementById('s-pass').value;
  const btn = document.getElementById('s-btn');
  const err = document.getElementById('s-err');
  const ok = document.getElementById('s-ok');
  err.textContent = ''; ok.textContent = '';
  if (!name || !email || !pass) { err.textContent = 'Please fill in all fields.'; return; }
  if (pass.length < 8) { err.textContent = 'Password must be at least 8 characters.'; return; }
  btn.disabled = true; btn.textContent = 'Creating account…';
  const { error } = await sb.auth.signUp({ email, password: pass, options: { data: { full_name: name } } });
  if (error) { err.textContent = error.message; btn.disabled = false; btn.textContent = 'Create account'; return; }
  ok.textContent = 'Account created! Check your email to confirm, then sign in.';
  btn.textContent = 'Done';
}

// Allow Enter key to submit
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const loginActive = document.getElementById('form-login').classList.contains('active');
  if (loginActive) doLogin(); else doSignup();
});
</script>
</body>
</html>
